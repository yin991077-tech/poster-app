<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>海报生成器（自定义尺寸 + 自动裁剪）</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 20px;
    }
    input {
      padding: 6px;
      margin: 5px;
      width: 150px;
    }
    button {
      padding: 6px 12px;
      margin: 5px;
      cursor: pointer;
    }
    canvas {
      margin-top: 20px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>

<h2>海报生成器（自定义尺寸 + 自动裁剪）</h2>

<input id="urlInput" placeholder="粘贴链接" />
<input id="widthInput" placeholder="宽度 (默认350)" />
<input id="heightInput" placeholder="高度 (默认250)" />

<br/>

<button onclick="generate()">生成</button>
<button onclick="download()">下载</button>

<br/>
<canvas id="canvas" width="350" height="250"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// 自动换行
function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split("");
  let line = "";
  for (let i = 0; i < words.length; i++) {
    const testLine = line + words[i];
    const testWidth = ctx.measureText(testLine).width;
    if (testWidth > maxWidth && i > 0) {
      ctx.fillText(line, x, y);
      line = words[i];
      y += lineHeight;
    } else {
      line = testLine;
    }
  }
  ctx.fillText(line, x, y);
}

async function generate() {
  const url = document.getElementById("urlInput").value;

  const width = parseInt(document.getElementById("widthInput").value) || 350;
  const height = parseInt(document.getElementById("heightInput").value) || 250;

  canvas.width = width;
  canvas.height = height;

  if (!url) {
    alert("请输入链接");
    return;
  }

  try {
    console.log("请求:", url);

    const res = await fetch("https://poster-app-lds4.onrender.com/api/parse?url=" + encodeURIComponent(url));
    const data = await res.json();

    console.log("返回:", data);

    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, width, height);

    const img = new Image();
    img.crossOrigin = "anonymous";
    img.src = data.image;

    img.onload = () => {
      const iw = img.width;
      const ih = img.height;

      const canvasRatio = width / height;
      const imgRatio = iw / ih;

      let sx, sy, sw, sh;

      if (imgRatio > canvasRatio) {
        // 横图 → 裁左右
        sh = ih;
        sw = ih * canvasRatio;
        sx = (iw - sw) / 2;
        sy = 0;
      } else {
        // 竖图 → 裁上下
        sw = iw;
        sh = iw / canvasRatio;
        sx = 0;
        sy = (ih - sh) / 2;
      }

      // 图片区域（上40%）
      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, width, height * 0.4);

      // 标题
      ctx.fillStyle = "#000";
      ctx.font = "bold " + Math.floor(height * 0.07) + "px sans-serif";
      wrapText(ctx, data.title || "示例标题", 10, height * 0.5, width - 20, 20);

      // 描述
      ctx.font = Math.floor(height * 0.05) + "px sans-serif";
      wrapText(ctx, data.description || "示例描述", 10, height * 0.7, width - 20, 18);
    };

    img.onerror = () => {
      alert("图片加载失败");
    };

  } catch (err) {
    console.error(err);
    alert("请求失败，请检查后端");
  }
}

// 下载
function download() {
  const link = document.createElement("a");
  link.download = "poster.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}
</script>

</body>
</html>
